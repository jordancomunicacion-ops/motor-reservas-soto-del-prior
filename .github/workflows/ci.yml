name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Lint, typecheck, prisma validate
    runs-on: ubuntu-latest
    # DATABASE_URL ficticio: prisma validate / generate cargan el datasource y
    # exigen la variable aunque no abren conexión. Antes el CI pasaba porque
    # el schema fallaba en validación sintáctica antes de leer env.
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # 20.19.x es el mínimo que soporta require() de un módulo ESM. Vitest carga
          # su config (CJS) haciendo require de `std-env` (ESM); en 20.18.1 eso lanza
          # ERR_REQUIRE_ESM y los tests de web ni arrancan. Se mantiene el major 20
          # para seguir alineado con el runtime (Dockerfiles en node:20.18.1).
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Workaround para https://github.com/npm/cli/issues/4828:
      # npm ci omite optional deps específicas de plataforma. rolldown (usado por vitest)
      # depende de @rolldown/binding-<plataforma> como optional. Lo instalamos a mano.
      - name: Install rolldown linux binding (npm optional deps bug)
        run: npm install @rolldown/binding-linux-x64-gnu --no-save --no-audit --no-fund

      # Ambos schemas generan al MISMO @prisma/client (monorepo, una sola copia del
      # paquete), así que la última generación gana. El schema de motor-reservas es
      # un superconjunto del de web (incluye HotelReview, ResReview, modifyToken…),
      # por lo que debe generarse EL ÚLTIMO: si web se genera después, el cliente
      # pierde esos modelos y el typecheck de motor-reservas falla.
      - name: Prisma generate (web)
        run: npx prisma generate --schema=apps/web/prisma/schema.prisma

      - name: Prisma generate (motor-reservas)
        run: npx prisma generate --schema=apps/motor-reservas/prisma/schema.prisma

      - name: Prisma validate (motor-reservas)
        run: npx prisma validate --schema=apps/motor-reservas/prisma/schema.prisma

      - name: Prisma validate (web)
        run: npx prisma validate --schema=apps/web/prisma/schema.prisma

      - name: Typecheck motor-reservas
        run: npx tsc --noEmit -p apps/motor-reservas/tsconfig.json

      - name: Typecheck web
        working-directory: apps/web
        run: npx tsc --noEmit

      - name: Lint motor-reservas
        working-directory: apps/motor-reservas
        run: npm run lint -- --max-warnings=0
        continue-on-error: true

      - name: Lint web
        working-directory: apps/web
        run: npm run lint
        continue-on-error: true

      - name: Tests motor-reservas
        working-directory: apps/motor-reservas
        run: npm test

      - name: Tests web
        working-directory: apps/web
        run: npm test
