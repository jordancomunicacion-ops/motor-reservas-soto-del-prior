name: "sotoreservas"

networks:
  proxy-net:
    external: true
  reservas-internal-net:
    driver: bridge

volumes:
  reservas_db_data:

services:
  sotoreservas-db:
    image: postgres:15-alpine
    container_name: sotoreservas-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-reservas}
      POSTGRES_USER: ${DB_USER:-reservas_user}
      POSTGRES_PASSWORD: ${DB_PASS:-reservas_pass}
    volumes:
      - reservas_db_data:/var/lib/postgresql/data
    networks:
      - reservas-internal-net
    ports:
      - "5442:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-reservas_user} -d ${DB_NAME:-reservas}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  sotoreservas-engine:
    build:
      context: ./apps/motor-reservas
      dockerfile: Dockerfile
    container_name: sotoreservas-engine
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-reservas_user}:${DB_PASS:-reservas_pass}@sotoreservas-db:5432/${DB_NAME:-reservas}
      PORT: 3000
    networks:
      - reservas-internal-net
    depends_on:
      sotoreservas-db:
        condition: service_healthy
    expose:
      - "3000"

  sotoreservas-api:
    build:
      context: ./apps/motor-reservas
      dockerfile: Dockerfile
    container_name: sotoreservas-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-reservas_user}:${DB_PASS:-reservas_pass}@sotoreservas-db:5432/${DB_NAME:-reservas}
      ENGINE_URL: http://sotoreservas-engine:3000
      PORT: 3000
    networks:
      - reservas-internal-net
      - proxy-net
    depends_on:
      sotoreservas-db:
        condition: service_healthy
      sotoreservas-engine:
        condition: service_started
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sotoreservas-api.rule=Host(`api.reservas.sotodelprior.com`)"
      - "traefik.http.routers.sotoreservas-api.entrypoints=web,websecure"
      - "traefik.http.routers.sotoreservas-api.tls=true"
      - "traefik.http.routers.sotoreservas-api.tls.certresolver=le"
      - "traefik.http.routers.sotoreservas-api.middlewares=sotoreservas-headers"
      - "traefik.http.middlewares.sotoreservas-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.sotoreservas-headers.headers.customrequestheaders.X-Forwarded-Scheme=https"
      - "traefik.docker.network=proxy-net"
      - "traefik.http.services.sotoreservas-api.loadbalancer.server.port=3000"

  sotoreservas-web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.reservas.sotodelprior.com
    container_name: sotoreservas-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://api.reservas.sotodelprior.com
      AUTH_TRUST_HOST: "true"
      AUTH_URL: "https://reservas.sotodelprior.com"
      NEXTAUTH_URL: "https://reservas.sotodelprior.com"
      NEXTAUTH_TRUST_HOST: "true"
      NEXTAUTH_URL_INTERNAL: "http://localhost:3000"
      NEXTAUTH_SKIP_ENV_VALIDATION: "true"
      NODE_ENV: "production"
      AUTH_SECRET: "${AUTH_SECRET:-supersecretkeyreservas123}"
      DATABASE_URL: postgresql://${DB_USER:-reservas_user}:${DB_PASS:-reservas_pass}@sotoreservas-db:5432/${DB_NAME:-reservas}
    networks:
      - proxy-net
      - reservas-internal-net
    depends_on:
      - sotoreservas-api
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sotoreservas-web.rule=Host(`reservas.sotodelprior.com`)"
      - "traefik.http.routers.sotoreservas-web.entrypoints=web,websecure"
      - "traefik.http.routers.sotoreservas-web.tls=true"
      - "traefik.http.routers.sotoreservas-web.tls.certresolver=le"
      - "traefik.http.routers.sotoreservas-web.middlewares=sotoreservas-web-headers"
      - "traefik.http.middlewares.sotoreservas-web-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.sotoreservas-web-headers.headers.customrequestheaders.X-Forwarded-Scheme=https"
      - "traefik.docker.network=proxy-net"
      - "traefik.http.services.sotoreservas-web.loadbalancer.server.port=3000"
